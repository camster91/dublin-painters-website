<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interior Painting | Painters Dublin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#2563eb', dark: '#0f172a', green: '#16a34a' } }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-slate-800 antialiased bg-white pb-16 md:pb-0">

    <header class="bg-white border-b border-slate-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <a href="index.html" class="font-bold text-xl">Painters<span class="text-brand-blue">Dublin</span></a>
            <a href="tel:012345678" class="bg-brand-green text-white px-5 py-2.5 rounded-full font-semibold">01 234 5678</a>
        </div>
    </header>

    <section class="py-20 bg-slate-50">
        <div class="max-w-7xl mx-auto px-4">
            <h1 class="text-4xl md:text-5xl font-extrabold text-brand-dark mb-6">Flawless Interior Painting</h1>
            <p class="text-lg text-slate-600 mb-8 max-w-2xl">Premium finishes for walls, ceilings, and woodwork. We treat your home with total respect.</p>
            <div class="grid md:grid-cols-2 gap-8">
                <img src="https://images.unsplash.com/photo-1562259949-e8e7689d7828?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" class="rounded-2xl shadow-md">
                <div class="space-y-6">
                    <h2 class="text-2xl font-bold">Why Dublin Homeowners Choose Us</h2>
                    <ul class="space-y-4">
                        <li class="flex items-center gap-3"><i data-lucide="check" class="text-brand-green"></i> Dustless Sanding Technology</li>
                        <li class="flex items-center gap-3"><i data-lucide="check" class="text-brand-green"></i> 2-Year Guarantee</li>
                        <li class="flex items-center gap-3"><i data-lucide="check" class="text-brand-green"></i> Full Insurance Coverage</li>
                    </ul>
                    <a href="index.html#quote-section" class="inline-block bg-brand-blue text-white px-8 py-4 rounded-xl font-bold text-lg">Get Your Quote</a>
                </div>
            </div>
        </div>
    </section>

    <script src="assets/js/main.js"></script>

</html>
